    <li class="nav-item"><a href="{{ '/teaching' | relative_url }}">Teaching</a></li>
    <li class="nav-item nav-dropdown">
      <button class="nav-dropdown-toggle" aria-expanded="false" aria-haspopup="true">Personal <span class="nav-arrow">&#9662;</span></button>
      <ul class="nav-dropdown-menu">

    </li>

</nav>

<script>
(function() {
  var toggle = document.querySelector('.nav-dropdown-toggle');
  var dropdown = toggle.closest('.nav-dropdown');

  toggle.addEventListener('click', function(e) {
    e.preventDefault();
    var expanded = toggle.getAttribute('aria-expanded') === 'true';
    toggle.setAttribute('aria-expanded', String(!expanded));
    dropdown.classList.toggle('nav-dropdown-open');
  });

  document.addEventListener('click', function(e) {
    if (!dropdown.contains(e.target)) {
      toggle.setAttribute('aria-expanded', 'false');
      dropdown.classList.remove('nav-dropdown-open');
    }
  });

  dropdown.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      toggle.setAttribute('aria-expanded', 'false');
      dropdown.classList.remove('nav-dropdown-open');
      toggle.focus();
    }
  });
})();
</script>
