title: "Tzu-Yang Chou"
description: "Personal academic site — algebraic geometry, derived categories, and fine dining reviews."
repository: TzuYangChou/TzuYangChou.github.io
remote_theme: pages-themes/cayman@v0.2.0
url: "https://tzuyangchou.github.io"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - MAINTAINING.md
  - CLAUDE.md
  - .claude/
  - .omx/
  - vendor

kramdown:
  hard_wrap: true

collections:
  reviews:
    output: true
    permalink: /fine-dining/:name/
